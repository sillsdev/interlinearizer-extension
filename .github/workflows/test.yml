name: Test

on:
  push:
    branches: ['main', 'release-prep', 'hotfix-*']
  pull_request:
    branches: ['main', 'release-prep', 'hotfix-*']

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4
        with:
          path: extension-repo

      - name: Checkout paranext-core repo to use its sub-packages
        uses: actions/checkout@v4
        with:
          path: paranext-core
          repository: paranext/paranext-core

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'npm'
          cache-dependency-path: |
            extension-repo/package-lock.json
            paranext-core/package-lock.json
          node-version-file: extension-repo/package.json

      - name: Install extension dependencies
        working-directory: extension-repo
        run: npm ci --ignore-scripts

      - name: Install core dependencies
        working-directory: paranext-core
        # Do not omit optional deps here: extensions/watch needs lightningcss native binaries.
        run: npm ci --ignore-scripts

      - name: Install Linux lightningcss native binary
        if: matrix.os == 'ubuntu-latest'
        working-directory: paranext-core
        run: npm install --ignore-scripts --no-save lightningcss-linux-x64-gnu@1.32.0

      - name: Verify jest-dom dependency
        working-directory: extension-repo
        run: npm ls @testing-library/jest-dom --depth=0

      - name: Run tests
        working-directory: extension-repo
        run: npm run test:coverage

  e2e-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4
        with:
          path: extension-repo

      - name: Checkout paranext-core repo
        uses: actions/checkout@v4
        with:
          path: paranext-core
          repository: paranext/paranext-core

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'npm'
          cache-dependency-path: |
            extension-repo/package-lock.json
            paranext-core/package-lock.json
          node-version-file: extension-repo/package.json

      - name: Install extension dependencies
        working-directory: extension-repo
        run: npm ci --ignore-scripts --include=dev

      - name: Install core dependencies
        working-directory: paranext-core
        # Do not omit optional deps here: extensions/watch needs lightningcss native binaries.
        run: npm ci --ignore-scripts

      - name: Install Linux lightningcss native binary
        if: matrix.os == 'ubuntu-latest'
        working-directory: paranext-core
        run: npm install --ignore-scripts --no-save lightningcss-linux-x64-gnu@1.32.0

      - name: Install Electron binary
        working-directory: paranext-core
        run: node node_modules/electron/install.js

      - name: Install system dependencies for Electron
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends xvfb libgbm-dev libnss3 libxss1 libasound2t64

      - name: Build extension
        working-directory: extension-repo
        run: npm run build

      - name: Build paranext-core dev bundle
        working-directory: paranext-core
        run: npm run prestart

      - name: Build paranext-core renderer DLL
        working-directory: paranext-core
        run: npm run build:dll

      - name: Run e2e smoke tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: extension-repo
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm run test:e2e:smoke

      - name: Run e2e smoke tests (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: extension-repo
        run: npm run test:e2e:smoke

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts-${{ matrix.os }}
          path: |
            extension-repo/playwright-report/
            extension-repo/e2e-tests/test-results/
          if-no-files-found: warn
          retention-days: 7
