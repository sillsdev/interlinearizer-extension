name: Test

on:
  push:
    branches: ['main', 'release-prep', 'hotfix-*']
  pull_request:
    branches: ['main', 'release-prep', 'hotfix-*']

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4
        with:
          path: extension-repo

      - name: Checkout paranext-core repo to use its sub-packages
        uses: actions/checkout@v4
        with:
          path: paranext-core
          repository: paranext/paranext-core

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'npm'
          cache-dependency-path: |
            extension-repo/package-lock.json
            paranext-core/package-lock.json
          node-version-file: extension-repo/package.json

      - name: Install extension dependencies
        working-directory: extension-repo
        run: npm ci --ignore-scripts

      - name: Install core dependencies
        working-directory: paranext-core
        # Do not omit optional deps here: extensions/watch needs lightningcss native binaries.
        run: npm ci --ignore-scripts

      - name: Verify jest-dom dependency
        working-directory: extension-repo
        run: npm ls @testing-library/jest-dom --depth=0

      - name: Run tests
        working-directory: extension-repo
        run: npm run test:coverage

  e2e-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4
        with:
          path: extension-repo

      - name: Checkout paranext-core repo
        uses: actions/checkout@v4
        with:
          path: paranext-core
          repository: paranext/paranext-core

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: 'npm'
          cache-dependency-path: |
            extension-repo/package-lock.json
            paranext-core/package-lock.json
          node-version-file: extension-repo/package.json

      - name: Install extension dependencies
        working-directory: extension-repo
        run: npm ci --ignore-scripts --include=dev

      - name: Install core dependencies
        working-directory: paranext-core
        run: npm ci --ignore-scripts --omit=optional

      - name: Install Electron binary
        working-directory: paranext-core
        run: node node_modules/electron/install.js

      - name: Install system dependencies for Electron
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends xvfb libgbm-dev libnss3 libxss1 libasound2t64

      - name: Build extension
        working-directory: extension-repo
        run: npm run build

      - name: Build paranext-core dev bundle
        working-directory: paranext-core
        run: npm run prestart

      - name: Build paranext-core renderer DLL
        working-directory: paranext-core
        run: npm run build:dll

      - name: Run e2e smoke tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: extension-repo
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" npm run test:e2e:smoke

      - name: Run e2e smoke tests (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: extension-repo
        run: npm run test:e2e:smoke

      - name: Redact renderer dev server log
        if: always()
        shell: pwsh
        run: |
          $rawLog = "extension-repo/e2e-tests/test-results/renderer-dev-server.log"
          $sanitizedLog = "extension-repo/e2e-tests/test-results/renderer-dev-server.sanitized.log"
          if (-not (Test-Path $rawLog)) {
            Write-Host "Renderer log file not found: $rawLog"
            exit 0
          }

          # Redact common secret patterns before printing/uploading logs.
          $content = Get-Content -Path $rawLog -Raw
          $patterns = @(
            @{ Regex = '(?i)(authorization\s*[:=]\s*)(?:bearer\s+)?[^\s"'']+'; Replacement = '$1[REDACTED]' },
            @{ Regex = '(?i)(x-api-key\s*[:=]\s*)[^\s"'']+'; Replacement = '$1[REDACTED]' },
            @{ Regex = '(?i)(token\s*[:=]\s*)[^\s"'']+'; Replacement = '$1[REDACTED]' },
            @{ Regex = '(?i)(secret\s*[:=]\s*)[^\s"'']+'; Replacement = '$1[REDACTED]' },
            @{ Regex = '(?i)(password\s*[:=]\s*)[^\s"'']+'; Replacement = '$1[REDACTED]' },
            @{ Regex = '(?i)(client_secret\s*[:=]\s*)[^\s"'']+'; Replacement = '$1[REDACTED]' },
            @{ Regex = '(?i)(access[_-]?token\s*[:=]\s*)[^\s"'']+'; Replacement = '$1[REDACTED]' },
            @{ Regex = '(?i)(refresh[_-]?token\s*[:=]\s*)[^\s"'']+'; Replacement = '$1[REDACTED]' },
            @{ Regex = '(?i)(api[_-]?key\s*[:=]\s*)[^\s"'']+'; Replacement = '$1[REDACTED]' },
            @{ Regex = '(?i)(-----BEGIN [A-Z ]+PRIVATE KEY-----)(.|\n|\r)*?(-----END [A-Z ]+PRIVATE KEY-----)'; Replacement = '$1[REDACTED]$3' }
          )

          foreach ($pattern in $patterns) {
            $content = [System.Text.RegularExpressions.Regex]::Replace(
              $content,
              $pattern.Regex,
              $pattern.Replacement,
              [System.Text.RegularExpressions.RegexOptions]::IgnoreCase
            )
          }

          Set-Content -Path $sanitizedLog -Value $content -NoNewline
          Write-Host "Sanitized renderer log written to: $sanitizedLog"

      - name: Show renderer dev server log tail (Linux)
        if: failure() && matrix.os == 'ubuntu-latest'
        run: |
          LOG_PATH="extension-repo/e2e-tests/test-results/renderer-dev-server.sanitized.log"
          if [ -f "$LOG_PATH" ]; then
            echo "=== Renderer log tail: $LOG_PATH ==="
            tail -n 200 "$LOG_PATH"
          else
            echo "Renderer log file not found: $LOG_PATH"
          fi

      - name: Show renderer dev server log tail (Windows)
        if: failure() && matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $logPath = "extension-repo/e2e-tests/test-results/renderer-dev-server.sanitized.log"
          if (Test-Path $logPath) {
            Write-Host "=== Renderer log tail: $logPath ==="
            Get-Content -Path $logPath -Tail 200
          } else {
            Write-Host "Renderer log file not found: $logPath"
          }

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-artifacts-${{ matrix.os }}
          path: |
            extension-repo/playwright-report/
            extension-repo/e2e-tests/test-results/
            extension-repo/e2e-tests/test-results/renderer-dev-server.sanitized.log
          if-no-files-found: warn
          retention-days: 7
